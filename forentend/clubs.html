<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Actions</title>
    <link rel="stylesheet" href="clubs.css">
</head>
<body>
    <h2>Club Actions</h2>

    <div>
        <input type="text" id="clubId" placeholder="Enter Club ID">
        <button class="join" onclick="handleJoinClub()">Join Club</button>
        <button class="leave" onclick="handleLeaveClub()">Leave Club</button>
    </div>

    <p id="message"></p>

    <h2>Create a Club</h2>
    <div>
        <input type="text" id="clubName" placeholder="Enter Club Name">
        <input type="text" id="clubPost" placeholder="Enter Post (Optional)">
        <button class="create" onclick="handleCreateClub()">Create Club</button>
    </div>

    <p id="createMessage"></p>

    <script src="clubs.js"></script>
</body>
</html>
